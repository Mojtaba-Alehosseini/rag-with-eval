# Evaluation test set for the RAG harness.
#
# Each item:
#   question              - the user query
#   ground_truth          - reference answer (used by RAGAS + offline proxy metrics)
#   ground_truth_sources  - file(s) that genuinely contain the answer (relevance labels
#                           for context-precision / context-recall)
#   language              - en | it
#   type                  - factual | negative (negative = not in corpus, must be refused)

- question: "What two weaknesses of standalone language models does RAG address?"
  ground_truth: "RAG addresses stale knowledge and hallucination."
  ground_truth_sources: ["01_what_is_rag.md"]
  language: en
  type: factual

- question: "What are the five stages of a RAG pipeline?"
  ground_truth: "Load documents, split them into chunks, embed the chunks, store the vectors, and at query time retrieve the most similar chunks for the language model."
  ground_truth_sources: ["01_what_is_rag.md"]
  language: en
  type: factual

- question: "What is chunk overlap and why is it used?"
  ground_truth: "Chunk overlap is the number of tokens repeated between consecutive chunks so a sentence split across a boundary still appears intact in at least one chunk."
  ground_truth_sources: ["02_chunking.md"]
  language: en
  type: factual

- question: "What chunk size and overlap are a common starting point?"
  ground_truth: "A chunk size of 1024 tokens with an overlap of 200 tokens."
  ground_truth_sources: ["02_chunking.md"]
  language: en
  type: factual

- question: "How does a sentence-aware splitter like SentenceSplitter work?"
  ground_truth: "It packs whole sentences into a chunk until the size limit is reached, instead of cutting at a fixed character count."
  ground_truth_sources: ["02_chunking.md"]
  language: en
  type: factual

- question: "When vectors are normalized to unit length, what does cosine similarity equal?"
  ground_truth: "Their dot product."
  ground_truth_sources: ["03_embeddings.md"]
  language: en
  type: factual

- question: "How many dimensions does the all-MiniLM-L6-v2 embedding model produce?"
  ground_truth: "384 dimensions."
  ground_truth_sources: ["03_embeddings.md"]
  language: en
  type: factual

- question: "What is the range of cosine similarity?"
  ground_truth: "Cosine similarity ranges from -1 to 1."
  ground_truth_sources: ["03_embeddings.md"]
  language: en
  type: factual

- question: "What does the BM25 ranking function score a document by?"
  ground_truth: "By how often the query terms appear in it, weighted by how rare each term is across the corpus."
  ground_truth_sources: ["04_retrieval.md"]
  language: en
  type: factual

- question: "What is Reciprocal Rank Fusion used for in hybrid search?"
  ground_truth: "To merge the lexical and dense ranked lists by scoring each chunk as the sum of 1 over a constant plus its rank in each list, with no score normalization needed."
  ground_truth_sources: ["04_retrieval.md"]
  language: en
  type: factual

- question: "What is a weakness of dense retrieval compared with BM25?"
  ground_truth: "Dense retrieval can miss exact keyword matches such as product codes or rare names."
  ground_truth_sources: ["04_retrieval.md"]
  language: en
  type: factual

- question: "What is the difference between a bi-encoder and a cross-encoder?"
  ground_truth: "A bi-encoder embeds the query and chunk separately and compares their vectors; a cross-encoder feeds the query and chunk together and outputs one relevance score, which is more accurate but too slow to run over a whole corpus."
  ground_truth_sources: ["05_reranking.md"]
  language: en
  type: factual

- question: "Which evaluation metric does reranking most directly improve?"
  ground_truth: "Context precision, because reranking pushes the truly relevant chunks to the top."
  ground_truth_sources: ["05_reranking.md"]
  language: en
  type: factual

- question: "What dataset is the cross-encoder/ms-marco-MiniLM-L-6-v2 reranker trained on?"
  ground_truth: "The MS MARCO passage ranking dataset."
  ground_truth_sources: ["05_reranking.md"]
  language: en
  type: factual

- question: "What does faithfulness measure in RAG evaluation?"
  ground_truth: "Whether the generated answer is supported by the retrieved context; an unfaithful answer contains claims the context does not support."
  ground_truth_sources: ["06_rag_evaluation.md"]
  language: en
  type: factual

- question: "What does answer relevancy measure?"
  ground_truth: "How well the answer addresses the question that was asked."
  ground_truth_sources: ["06_rag_evaluation.md"]
  language: en
  type: factual

- question: "Why does RAGAS raise an error without an OpenAI key, and what is the fix?"
  ground_truth: "By default RAGAS uses OpenAI for both the judge model and embeddings; the fix is to configure the judge and embeddings to a local or free-tier model before calling evaluate."
  ground_truth_sources: ["06_rag_evaluation.md"]
  language: en
  type: factual

- question: "What is HNSW and when is it used?"
  ground_truth: "HNSW is an approximate nearest neighbour index that trades a little recall for a large speed-up, used for large corpora."
  ground_truth_sources: ["07_vector_databases.md"]
  language: en
  type: factual

- question: "What does pgvector add to PostgreSQL?"
  ground_truth: "It adds vector search to PostgreSQL."
  ground_truth_sources: ["07_vector_databases.md"]
  language: en
  type: factual

- question: "Che cos'è il RAG?"
  ground_truth: "È una tecnica che àncora la risposta di un modello linguistico ai documenti recuperati al momento della domanda."
  ground_truth_sources: ["08_rag_in_italiano.md"]
  language: it
  type: factual

- question: "Che cosa misura la fedeltà di una risposta?"
  ground_truth: "Misura se la risposta è supportata dal contesto recuperato."
  ground_truth_sources: ["08_rag_in_italiano.md"]
  language: it
  type: factual

